spring:
  application:
    name: orbit-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

orbit:
  cors:
    # Vite dev ports (5173 default, 5191 when 5173 is taken). Prod sets CORS_ORIGINS to the web origin.
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:5174,http://localhost:5191}
  http:
    connect-timeout-ms: 4000
    read-timeout-ms: 10000
  nasa:
    base-url: ${NASA_BASE_URL:https://api.nasa.gov}
    api-key: ${NASA_API_KEY:DEMO_KEY}
  iss:
    # Primary is fast + cloud-friendly; wheretheiss is the slower fallback. Celestrak is NOT used:
    # it silently drops connections from datacenter IPs, so it never resolves from Render.
    base-url: ${ISS_TLE_BASE_URL:https://tle.ivanstanojevic.me}
    fallback-base-url: ${ISS_TLE_FALLBACK_URL:https://api.wheretheiss.at}
  library:
    base-url: ${LIBRARY_BASE_URL:https://images-api.nasa.gov}
  gemini:
    # AI flight-director narration. With no GEMINI_API_KEY the endpoint serves a grounded,
    # templated narration instead, so the feature works (and is demoable) without a key.
    base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}

resilience4j:
  retry:
    instances:
      upstream:
        max-attempts: 3
        wait-duration: 400ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - com.orbit.provider.UpstreamException
